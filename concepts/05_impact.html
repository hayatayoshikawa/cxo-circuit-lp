<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CXO CIRCUIT — ⑤ インパクト版（えんじ）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Zen+Kaku+Gothic+New:wght@900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --enja:  #8C1C35;
      --enja-d:#6E1429;
      --fg:    #FFFFFF;
      --zen:   'Zen Kaku Gothic New', sans-serif;
      --arch:  'Archivo', sans-serif;
      --jp:    'Noto Sans JP', sans-serif;
    }

    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--jp); background: var(--enja); color: var(--fg); }
    a { text-decoration: none; color: inherit; }

    /* ── NAV ── */
    nav {
      position: fixed;
      inset: 0 0 auto 0;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      background: rgba(110, 20, 41, .50);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,.10);
      z-index: 100;
    }
    .logo {
      font-family: var(--arch);
      font-weight: 900;
      font-size: 14.5px;
      letter-spacing: .10em;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .logo-mark {
      width: 22px; height: 22px;
      border: 2px solid rgba(255,255,255,.85);
      border-radius: 50%;
      position: relative;
      flex-shrink: 0;
    }
    .logo-mark::after {
      content: '';
      position: absolute;
      inset: 4px;
      background: #fff;
      border-radius: 50%;
    }
    .nav-links { list-style: none; display: flex; gap: 28px; }
    .nav-links a {
      font-family: var(--jp);
      font-size: 12px;
      color: rgba(255,255,255,.60);
      transition: color .15s;
    }
    .nav-links a:hover { color: #fff; }
    .nav-cta {
      font-family: var(--jp);
      font-weight: 700;
      font-size: 12.5px;
      background: #fff;
      color: var(--enja);
      padding: 9px 22px;
      border-radius: 40px;
      transition: opacity .2s;
    }
    .nav-cta:hover { opacity: .88; }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--enja);
    }

    /* ── 速線レイヤー ── */
    .speed-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .speed-layer line {
      animation: rush 1.1s cubic-bezier(.22,.9,.36,1) both;
    }
    @keyframes rush {
      from { stroke-dashoffset: 2000; }
      to   { stroke-dashoffset: 0; }
    }

    /* ── 巨大テキスト ── */
    .big-text {
      position: absolute;
      left: -1vw;
      top: 50%;
      transform: translateY(-52%);
      font-family: var(--zen);
      font-weight: 900;
      font-size: clamp(140px, 23vw, 360px);
      line-height: .86;
      letter-spacing: -.02em;
      color: #fff;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      z-index: 5;
    }

    /* ── 右：情報カラム ── */
    .info-col {
      position: absolute;
      right: 4%;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0;
    }

    /* 給与帯 */
    .salary {
      font-family: var(--arch);
      font-weight: 900;
      font-size: clamp(20px, 2.2vw, 34px);
      line-height: 1.1;
      letter-spacing: -.01em;
      text-align: right;
      opacity: .95;
    }
    .salary small {
      display: block;
      font-family: var(--jp);
      font-size: .45em;
      font-weight: 400;
      opacity: .75;
      letter-spacing: .04em;
      margin-top: 2px;
    }

    /* 区切り線 */
    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,.30);
      margin: 18px 0;
    }

    /* 件数 */
    .count-wrap {
      text-align: right;
    }
    .count-num {
      font-family: var(--arch);
      font-weight: 900;
      font-size: clamp(52px, 5.5vw, 88px);
      line-height: 1;
      letter-spacing: -.03em;
    }
    .count-unit {
      font-family: var(--jp);
      font-size: .32em;
      font-weight: 700;
      opacity: .75;
      vertical-align: super;
      letter-spacing: .04em;
    }
    .count-label {
      font-family: var(--jp);
      font-size: clamp(12px, 1.1vw, 16px);
      font-weight: 700;
      line-height: 1.6;
      text-align: right;
      opacity: .88;
      margin-top: 6px;
    }

    /* CTA */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      background: #fff;
      color: var(--enja);
      font-family: var(--jp);
      font-weight: 700;
      font-size: clamp(13px, 1.1vw, 16px);
      padding: 14px 28px;
      border-radius: 40px;
      transition: opacity .2s, transform .2s;
    }
    .cta-btn:hover { opacity: .9; transform: translateY(-2px); }

    /* ── 下部ラベル（小） ── */
    .foot-note {
      position: absolute;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: var(--jp);
      font-size: 11px;
      color: rgba(255,255,255,.40);
      white-space: nowrap;
      letter-spacing: .12em;
    }

    @media (max-width: 900px) {
      .nav-links { display: none; }
      .info-col { right: 3%; }
    }
    @media (max-width: 640px) {
      nav { padding: 0 18px; }
      .big-text { font-size: 22vw; }
      .info-col { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="#"><span class="logo-mark"></span>CXO CIRCUIT</a>
  <ul class="nav-links">
    <li><a href="#">サービス</a></li>
    <li><a href="#">求人</a></li>
    <li><a href="#">ご利用の流れ</a></li>
    <li><a href="#">運営会社</a></li>
  </ul>
  <a class="nav-cta" href="#">無料で相談する</a>
</nav>

<section class="hero">

  <!-- 速線エフェクト -->
  <svg class="speed-layer" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice"
       xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <line x1="-200" y1="88"  x2="1800" y2="60"  stroke="white" stroke-width="1.5" opacity=".10" stroke-dasharray="2000" style="animation-delay:.05s"/>
    <line x1="-200" y1="145" x2="1800" y2="120" stroke="white" stroke-width="3"   opacity=".07" stroke-dasharray="2000" style="animation-delay:.10s"/>
    <line x1="-200" y1="240" x2="1800" y2="218" stroke="white" stroke-width="1"   opacity=".13" stroke-dasharray="2000" style="animation-delay:.15s"/>
    <line x1="-200" y1="310" x2="1800" y2="290" stroke="white" stroke-width="4"   opacity=".06" stroke-dasharray="2000" style="animation-delay:.08s"/>
    <line x1="-200" y1="420" x2="1800" y2="400" stroke="white" stroke-width="1"   opacity=".11" stroke-dasharray="2000" style="animation-delay:.18s"/>
    <line x1="-200" y1="490" x2="1800" y2="472" stroke="white" stroke-width="2.5" opacity=".08" stroke-dasharray="2000" style="animation-delay:.12s"/>
    <line x1="-200" y1="570" x2="1800" y2="554" stroke="white" stroke-width="1"   opacity=".14" stroke-dasharray="2000" style="animation-delay:.06s"/>
    <line x1="-200" y1="650" x2="1800" y2="636" stroke="white" stroke-width="3.5" opacity=".06" stroke-dasharray="2000" style="animation-delay:.20s"/>
    <line x1="-200" y1="730" x2="1800" y2="718" stroke="white" stroke-width="1"   opacity=".10" stroke-dasharray="2000" style="animation-delay:.14s"/>
    <line x1="-200" y1="810" x2="1800" y2="800" stroke="white" stroke-width="2"   opacity=".08" stroke-dasharray="2000" style="animation-delay:.09s"/>
  </svg>

  <!-- 巨大テキスト -->
  <div class="big-text" aria-hidden="false">経営に、<br>挑め。</div>

  <!-- 右：シンプル情報カラム -->
  <div class="info-col">
    <p class="salary">
      年収1,000万〜<br>3,000万円規模
      <small>の非公開求人</small>
    </p>
    <div class="divider"></div>
    <div class="count-wrap">
      <span class="count-num">500<span class="count-unit">件超</span></span>
      <p class="count-label">経営層・幹部候補の<br>非公開ポジション掲載中</p>
    </div>
    <a class="cta-btn" href="#">無料で相談する →</a>
  </div>

  <p class="foot-note">OPERATED BY BEYONDGE 株式会社 — 登録・相談 完全無料</p>

</section>

</body>
</html>
