<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CXO CIRCUIT｜経営に挑むキャリアは、ここから始まる。</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0A1022; --ink-2:#0D1430; --text:#F3F6FC; --mute:#94A0B8;
  --blue:#3D6CF5; --lime:#C7F046; --coral:#F0573F; --tan:#CBA76A; --white:#EEF1F6;
  --arch:'Archivo',sans-serif; --mono:'Space Mono',monospace; --jp:'Noto Sans JP',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ink);color:var(--text);font-family:var(--jp);overflow-x:hidden}
a{color:inherit;text-decoration:none}

.hero{position:relative;min-height:100vh;overflow:hidden;display:flex;flex-direction:column;justify-content:center;
  background:
   radial-gradient(1100px 760px at 76% 42%, rgba(61,108,245,.22), transparent 58%),
   radial-gradient(700px 560px at 92% 80%, rgba(240,87,63,.12), transparent 60%),
   linear-gradient(160deg,#0B1226 0%,#0A1022 55%,#080C1A 100%)}
.hero::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.35;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='150'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>")}

/* ヘッダー */
header{position:absolute;top:0;left:0;width:100%;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:26px 44px}
.logo{display:flex;align-items:center;gap:11px;font-family:var(--arch);font-weight:800;font-size:19px;letter-spacing:.04em}
.logo .mk{width:21px;height:21px;border:2px solid var(--text);border-radius:50%;position:relative}
.logo .mk::after{content:"";position:absolute;inset:4px;border-radius:50%;background:var(--lime)}
nav{display:flex;gap:30px;font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:rgba(243,246,252,.78)}
nav a:hover{color:var(--text)}
.c-btn{font-family:var(--jp);font-weight:700;font-size:13px;background:var(--white);color:#0A1022;padding:11px 22px;border-radius:40px;display:inline-flex;gap:8px;align-items:center}
.c-btn:hover{background:var(--lime)}

/* 本文 */
.hero-in{position:relative;z-index:20;max-width:1480px;margin:0 auto;width:100%;padding:0 44px}
.kicker{font-family:var(--mono);font-size:12px;letter-spacing:.22em;color:var(--lime);display:flex;align-items:center;gap:14px;margin-bottom:26px}
.kicker::before{content:"";width:42px;height:1px;background:var(--lime)}
.h1{font-family:var(--jp);font-weight:900;font-size:clamp(36px,5.6vw,82px);line-height:1.32;letter-spacing:.01em}
.h1 .l{display:block;overflow:hidden}
.h1 .l>span{display:inline-block;transform:translateY(115%);opacity:0;animation:rise 1s cubic-bezier(.2,.85,.25,1) forwards}
.h1 .l:nth-child(2) span{animation-delay:.12s}
.h1 .ac{color:var(--lime)}
@keyframes rise{to{transform:none;opacity:1}}
.sub{font-size:clamp(13px,1.4vw,16px);line-height:2;color:#C5CDDD;max-width:480px;margin-top:28px;font-weight:400;opacity:0;animation:fade 1s ease .7s forwards}
@keyframes fade{to{opacity:1}}
.cta{margin-top:38px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;opacity:0;animation:fade 1s ease .9s forwards}
.btn-main{background:var(--white);color:#0A1022;font-weight:700;font-size:15px;padding:16px 30px;border-radius:40px;display:inline-flex;align-items:center;gap:12px;transition:.2s}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(255,255,255,.18)}
.btn-main .ar{width:24px;height:24px;border-radius:50%;background:#0A1022;color:var(--white);display:flex;align-items:center;justify-content:center;font-size:12px}
.btn-line{font-family:var(--mono);font-size:12px;letter-spacing:.1em;color:var(--text);border-bottom:1px solid var(--mute);padding-bottom:4px}
.btn-line:hover{border-color:var(--lime)}

.meta{position:absolute;left:44px;bottom:30px;z-index:20;font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:rgba(243,246,252,.5)}
.scrollcue{position:absolute;left:50%;bottom:28px;transform:translateX(-50%);z-index:20;font-family:var(--mono);font-size:10px;letter-spacing:.3em;color:rgba(243,246,252,.6);display:flex;flex-direction:column;align-items:center;gap:10px}
.scrollcue .bar{width:1px;height:46px;background:rgba(243,246,252,.25);position:relative;overflow:hidden}
.scrollcue .bar::after{content:"";position:absolute;top:-46px;left:0;width:100%;height:46px;background:var(--lime);animation:cue 2s ease-in-out infinite}
@keyframes cue{0%{transform:translateY(0)}60%,100%{transform:translateY(92px)}}

/* ===== 3D 立体ブロック ===== */
.scene{position:absolute;inset:0;z-index:10;pointer-events:none;perspective:1400px}
.scene-in{position:absolute;right:8%;top:50%;width:560px;height:560px;transform:translateY(-50%);transform-style:preserve-3d;transition:transform .25s ease-out}
.cube{position:absolute;border-radius:30%;transform-style:preserve-3d;
  background:linear-gradient(145deg,var(--c1),var(--c2) 52%,var(--c3));
  box-shadow:
    inset 6px 8px 14px rgba(255,255,255,.45),
    inset -10px -14px 22px rgba(0,0,0,.30),
    0 40px 60px -18px var(--glow);
  animation:bob var(--d,8s) ease-in-out infinite var(--delay,0s)}
.cube::before{content:"";position:absolute;inset:0;border-radius:30%;
  background:radial-gradient(60% 50% at 30% 24%, rgba(255,255,255,.55), transparent 60%);opacity:.8}
@keyframes bob{0%,100%{transform:translate3d(0,0,var(--z,0)) rotateX(var(--rx,14deg)) rotateY(var(--ry,-20deg))}
  50%{transform:translate3d(0,-22px,var(--z,0)) rotateX(calc(var(--rx,14deg) + 4deg)) rotateY(calc(var(--ry,-20deg) - 6deg))}}

/* 個別 */
.cb-blue{width:230px;height:230px;left:120px;top:150px;--c1:#7AA0FF;--c2:#3D6CF5;--c3:#1E3FB0;--glow:rgba(61,108,245,.55);--rx:16deg;--ry:-22deg;--z:60px;--d:8s}
.cb-coral{width:180px;height:180px;left:40px;top:40px;--c1:#FF9077;--c2:#F0573F;--c3:#B5301E;--glow:rgba(240,87,63,.45);--rx:12deg;--ry:-16deg;--z:20px;--d:9s;--delay:-2s}
.cb-tan{width:120px;height:120px;left:330px;top:30px;--c1:#E6CFA0;--c2:#CBA76A;--c3:#9A7C44;--glow:rgba(203,167,106,.35);--rx:18deg;--ry:-24deg;--z:0;--d:10s;--delay:-4s}
.cb-lime{width:100px;height:100px;left:60px;top:330px;--c1:#E4FF9B;--c2:#C7F046;--c3:#93B82B;--glow:rgba(199,240,70,.4);--rx:10deg;--ry:-18deg;--z:30px;--d:7.5s;--delay:-1s}
.cb-white{width:150px;height:150px;left:330px;top:300px;--c1:#FFFFFF;--c2:#E2E8F2;--c3:#AEB8C9;--glow:rgba(180,195,220,.3);--rx:14deg;--ry:-20deg;--z:40px;--d:8.6s;--delay:-3s}
.cb-mini{width:66px;height:66px;left:430px;top:180px;--c1:#9AB4FF;--c2:#5B7BE8;--c3:#33489C;--glow:rgba(91,123,232,.4);--rx:12deg;--ry:-14deg;--z:80px;--d:6.8s;--delay:-2.5s}

@media(max-width:980px){
  nav{display:none}
  .scene-in{right:-8%;top:42%;width:380px;height:380px;opacity:.85}
  .cb-blue{width:160px;height:160px}.cb-coral{width:120px;height:120px}.cb-white{width:100px;height:100px}
  header{padding:18px 22px}.hero-in,.meta{padding-left:22px}.meta{left:22px}
}
@media(prefers-reduced-motion:reduce){
  *{animation:none!important}
  .h1 .l>span{transform:none;opacity:1}.sub,.cta{opacity:1}
}
</style>
</head>
<body>

<div class="hero">
  <header>
    <a class="logo" href="#"><span class="mk"></span>CXO CIRCUIT</a>
    <nav><a href="#">ABOUT</a><a href="#">POSITIONS</a><a href="#">FLOW</a><a href="#">VOICES</a></nav>
    <a class="c-btn" href="#">登録（無料） <span>→</span></a>
  </header>

  <!-- 3D ブロック -->
  <div class="scene"><div class="scene-in" id="scene">
    <div class="cube cb-coral"></div>
    <div class="cube cb-tan"></div>
    <div class="cube cb-blue"></div>
    <div class="cube cb-mini"></div>
    <div class="cube cb-lime"></div>
    <div class="cube cb-white"></div>
  </div></div>

  <div class="hero-in">
    <h1 class="h1">
      <span class="l"><span>経営に挑むキャリアは、</span></span>
      <span class="l"><span>ここから<span class="ac">始まる。</span></span></span>
    </h1>
    <p class="sub">事業責任者・幹部候補から CXO まで。経営層との直接的な接点から生まれる非公開ポジションを、あなたの経歴と志向に合わせてご紹介します。</p>
    <div class="cta">
      <a class="btn-main" href="#">経営人材として登録する <span class="ar">→</span></a>
      <a class="btn-line" href="#">VIEW POSITIONS</a>
    </div>
  </div>

  <div class="meta">N35.69 / E139.76 — OPERATED BY BEYONDGE</div>
  <div class="scrollcue">SCROLL<span class="bar"></span></div>
</div>

<script>
/* マウスパララックス（立体ブロックを傾ける） */
(function(){
  if(window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  var scene=document.getElementById('scene'), tx=0,ty=0,cx=0,cy=0;
  window.addEventListener('mousemove',function(e){
    var nx=(e.clientX/innerWidth-.5), ny=(e.clientY/innerHeight-.5);
    tx=nx*18; ty=ny*-12;
  });
  (function loop(){ cx+=(tx-cx)*.06; cy+=(ty-cy)*.06;
    scene.style.transform='translateY(-50%) rotateY('+cx+'deg) rotateX('+cy+'deg)';
    requestAnimationFrame(loop); })();
})();
</script>
</body>
</html>
