<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CXO CIRCUIT — ④ グラデーション波版（ヒーロー）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --lime: #C7F046;
      --blue: #3D6CF5;
      --navy: #0A1628;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #fff;
      color: var(--navy);
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      inset: 0 0 auto 0;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 52px;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Archivo', sans-serif;
      font-weight: 900;
      font-size: 15.5px;
      letter-spacing: 0.12em;
      color: var(--navy);
      text-decoration: none;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue) 0%, #7B9FF8 100%);
      position: relative;
      flex-shrink: 0;
    }

    .logo-mark::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.85);
    }

    .logo-mark::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #fff;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 36px;
    }

    .nav-links a {
      font-size: 13px;
      color: var(--navy);
      text-decoration: none;
      opacity: 0.58;
      font-weight: 400;
      letter-spacing: 0.01em;
      transition: opacity 0.15s;
    }

    .nav-links a:hover { opacity: 1; }

    .nav-btn {
      padding: 8.5px 20px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .nav-btn:hover { background: var(--blue); }

    /* ─── HERO ─── */
    .hero {
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    /* Gradient background: white → pale blue → pale green (like reference) */
    .hero-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(118deg,
        #ffffff 0%,
        #f3f6ff 38%,
        #edf8ee 72%,
        #e6f5e1 100%
      );
    }

    /* White vignette on text side for legibility */
    .hero-mask {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,
        rgba(255, 255, 255, 0.80) 0%,
        rgba(255, 255, 255, 0.55) 38%,
        rgba(255, 255, 255, 0.10) 60%,
        transparent 75%
      );
      z-index: 8;
      pointer-events: none;
    }

    /* ─── TEXT ─── */
    .hero-text {
      position: relative;
      z-index: 10;
      padding: 64px 0 0 76px;
      max-width: 520px;
    }

    .service-label {
      font-size: 11.5px;
      font-weight: 500;
      color: var(--blue);
      letter-spacing: 0.08em;
      margin-bottom: 22px;
    }

    .hero-h1 {
      font-size: clamp(34px, 3.5vw, 50px);
      font-weight: 700;
      line-height: 1.5;
      word-break: keep-all;
      margin-bottom: 22px;
      color: var(--navy);
    }

    .hero-body {
      font-size: 14.5px;
      line-height: 1.95;
      color: #4B5565;
      font-weight: 300;
      margin-bottom: 40px;
    }

    .hero-ctas {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .cta-primary {
      background: var(--blue);
      color: #fff;
      border: none;
      padding: 12px 26px;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.22s, box-shadow 0.22s, transform 0.22s;
    }

    .cta-primary:hover {
      background: #2855DF;
      box-shadow: 0 6px 22px rgba(61, 108, 245, 0.30);
      transform: translateY(-2px);
    }

    .cta-secondary {
      background: transparent;
      color: var(--navy);
      border: 1.5px solid rgba(10, 22, 40, 0.22);
      padding: 11px 22px;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .cta-secondary:hover { border-color: var(--navy); }

    /* ─── WAVE CANVAS ─── */
    #wc {
      position: absolute;
      right: 0;
      top: 0;
      width: 62%;
      height: 100%;
      z-index: 5;
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="#">
    <span class="logo-mark"></span>
    CXO CIRCUIT
  </a>
  <ul class="nav-links">
    <li><a href="#">サービス</a></li>
    <li><a href="#">事例</a></li>
    <li><a href="#">よくある質問</a></li>
    <li><a href="#">運営会社</a></li>
  </ul>
  <button class="nav-btn">無料で相談する</button>
</nav>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-mask"></div>

  <div class="hero-text">
    <p class="service-label">経営人材特化 キャリアプラットフォーム</p>
    <h1 class="hero-h1">経営に挑む<br>キャリアは、<br>ここから始まる。</h1>
    <p class="hero-body">
      CXO・CFO・COO などの経営ポジションへ。<br>
      正しい情報とサポートで、<br>
      あなたのキャリアを次のステージへ。
    </p>
    <div class="hero-ctas">
      <button class="cta-primary">無料で相談する <span>→</span></button>
      <button class="cta-secondary">サービスを見る</button>
    </div>
  </div>

  <canvas id="wc"></canvas>
</section>

<script>
(function () {
  'use strict';

  const canvas = document.getElementById('wc');
  const ctx    = canvas.getContext('2d');
  const DPR    = Math.min(window.devicePixelRatio || 1, 2);

  let W = 0, H = 0;

  function resize() {
    W = canvas.offsetWidth;
    H = canvas.offsetHeight;
    canvas.width  = W * DPR;
    canvas.height = H * DPR;
  }

  window.addEventListener('resize', resize);
  resize();

  /* ─── MESH CONFIG ─── */
  const COLS   = 62;
  const ROWS   = 38;
  const MESH_W = 850;   // wide → extends beyond canvas edges at near side
  const MESH_D = 520;   // depth
  const AMP    = 170;   // large amplitude → fills canvas vertically

  /* Camera: close + barely elevated → near-horizontal, wide perspective */
  const CAM_Y  = -45;   // small elevation → symmetric peaks/troughs
  const CAM_Z  = -210;  // close → dramatic foreshortening
  const FOV    = 420;
  const Z0     = 110;   // near edge z position

  /* ─── COLOR RAMP: dark blue → blue → sky → lime ─── */
  const RAMP = [
    [ 22,  58, 185],
    [ 61, 108, 245],
    [ 95, 170, 255],
    [165, 228,  88],
    [199, 240,  70],
  ];

  function sampleColor(n) {
    const i  = Math.max(0, Math.min(0.9999, n)) * (RAMP.length - 1);
    const lo = Math.floor(i);
    const hi = lo + 1;
    const f  = i - lo;
    return RAMP[lo].map((v, k) => Math.round(v + (RAMP[hi][k] - v) * f));
  }

  function rgba(c, a) {
    return `rgba(${c[0]},${c[1]},${c[2]},${a.toFixed(3)})`;
  }

  /* ─── PERSPECTIVE PROJECTION ─── */
  function project(x3, y3, z3) {
    const dz = z3 - CAM_Z;           // always positive
    const sc = FOV / dz;
    return {
      sx: W * 0.50 + x3 * sc,
      sy: H * 0.50 + (y3 - CAM_Y) * sc,
      sc,
    };
  }

  let t = 0;

  /* ─── MAIN DRAW LOOP ─── */
  function draw() {
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.clearRect(0, 0, W, H);

    /* Build grid */
    const grid = [];
    for (let r = 0; r < ROWS; r++) {
      const row = [];
      for (let c = 0; c < COLS; c++) {
        const x3 = (c / (COLS - 1) - 0.5) * MESH_W;
        const z3 = Z0 + (r / (ROWS - 1)) * MESH_D;

        /* Directional sum-of-waves → flowing ocean feel (not figure-8) */
        const wave =
          Math.sin(x3 * 0.009 + t * 1.80) * AMP * 0.55 +
          Math.sin(z3 * 0.010 - t * 1.40) * AMP * 0.30 +
          Math.sin(x3 * 0.006 - z3 * 0.007 + t * 0.90) * AMP * 0.20;

        const { sx, sy, sc } = project(x3, wave, z3);

        /* Normalize: max wave ≈ AMP, min ≈ -AMP */
        const normH     = Math.max(0, Math.min(1, (wave + AMP) / (AMP * 2)));
        const depthFade = Math.pow(1 - (r / ROWS) * 0.78, 0.60);
        const alpha     = (0.12 + normH * 0.88) * depthFade;
        const dotR      = Math.max(0.5, sc * 2.2 * (0.35 + normH * 0.85));

        row.push({ sx, sy, sc, normH, alpha, dotR });
      }
      grid.push(row);
    }

    /* Draw back-to-front (far rows first → near rows on top) */
    for (let r = ROWS - 1; r >= 0; r--) {

      /* Horizontal lines (along columns within a row) */
      for (let c = 0; c < COLS - 1; c++) {
        const a = grid[r][c];
        const b = grid[r][c + 1];
        const n  = (a.normH + b.normH) * 0.5;
        const al = (a.alpha  + b.alpha)  * 0.5 * 0.55;
        ctx.strokeStyle = rgba(sampleColor(n), al);
        ctx.lineWidth   = Math.max(0.2, (a.sc + b.sc) * 0.5 * 1.05);
        ctx.beginPath();
        ctx.moveTo(a.sx, a.sy);
        ctx.lineTo(b.sx, b.sy);
        ctx.stroke();
      }

      /* Vertical lines (connecting row r to row r+1) */
      if (r < ROWS - 1) {
        for (let c = 0; c < COLS; c++) {
          const a = grid[r][c];
          const b = grid[r + 1][c];
          const n  = (a.normH + b.normH) * 0.5;
          const al = (a.alpha  + b.alpha)  * 0.5 * 0.30;
          ctx.strokeStyle = rgba(sampleColor(n), al);
          ctx.lineWidth   = Math.max(0.15, (a.sc + b.sc) * 0.5 * 0.70);
          ctx.beginPath();
          ctx.moveTo(a.sx, a.sy);
          ctx.lineTo(b.sx, b.sy);
          ctx.stroke();
        }
      }

      /* Dots at grid intersections */
      for (let c = 0; c < COLS; c++) {
        const p   = grid[r][c];
        const col = sampleColor(p.normH);

        ctx.fillStyle = rgba(col, p.alpha);
        ctx.beginPath();
        ctx.arc(p.sx, p.sy, p.dotR, 0, Math.PI * 2);
        ctx.fill();

        /* Soft glow bloom on wave peaks */
        if (p.normH > 0.65 && p.alpha > 0.18) {
          const g = (p.normH - 0.65) / 0.35;
          ctx.fillStyle = rgba(col, p.alpha * g * 0.20);
          ctx.beginPath();
          ctx.arc(p.sx, p.sy, p.dotR * 5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    t += 0.007;
    requestAnimationFrame(draw);
  }

  draw();
}());
</script>

</body>
</html>
